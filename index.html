<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Multi-Agent RAG Assistant</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f5f7;
    color: #1a1a1a;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .app {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 18px 20px;
    background: #111827;
    color: white;
  }
  header h1 {
    margin: 0;
    font-size: 18px;
  }
  header p {
    margin: 4px 0 0;
    font-size: 13px;
    color: #9ca3af;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    max-width: 80%;
    padding: 12px 14px;
    border-radius: 12px;
    line-height: 1.45;
    font-size: 15px;
    white-space: pre-wrap;
  }
  .user {
    align-self: flex-end;
    background: #2563eb;
    color: white;
    border-bottom-right-radius: 2px;
  }
  .bot {
    align-self: flex-start;
    background: white;
    border: 1px solid #e5e7eb;
    border-bottom-left-radius: 2px;
  }
  .meta {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 6px;
  }
  .loading {
    align-self: flex-start;
    color: #9ca3af;
    font-size: 14px;
    font-style: italic;
  }
  form {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid #e5e7eb;
    background: white;
  }
  input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 15px;
    outline: none;
  }
  input:focus { border-color: #2563eb; }
  button {
    padding: 0 20px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }
  button:disabled { background: #93c5fd; cursor: default; }
  .empty {
    color: #9ca3af;
    text-align: center;
    margin-top: 40px;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>🤖 Multi-Agent RAG Assistant</h1>
      <p>Router → Retriever → Answer, orchestrated with LangGraph · Try asking about the sample leave policy, or anything general.</p>
    </header>
    <div id="chat">
      <div class="empty">Ask a question to get started — e.g. "How many sick leave days are allowed?"</div>
    </div>
    <form id="form">
      <input id="input" type="text" placeholder="Ask a question..." autocomplete="off" />
      <button id="sendBtn" type="submit">Send</button>
    </form>
  </div>

<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let firstMessage = true;

  function addMessage(text, sender, meta) {
    if (firstMessage) {
      chat.innerHTML = '';
      firstMessage = false;
    }
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.textContent = text;
    if (meta) {
      const metaDiv = document.createElement('div');
      metaDiv.className = 'meta';
      metaDiv.textContent = meta;
      div.appendChild(metaDiv);
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'loading';
    loadingDiv.textContent = 'Thinking... (may take up to a minute if the server was asleep)';
    chat.appendChild(loadingDiv);
    chat.scrollTop = chat.scrollHeight;

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });
      const data = await res.json();
      loadingDiv.remove();

      if (!res.ok) {
        addMessage('Error: ' + (data.detail || 'Something went wrong.'), 'bot');
      } else {
        const meta = `route: ${data.route_taken} · used document search: ${data.used_retrieval}`;
        addMessage(data.answer, 'bot', meta);
      }
    } catch (err) {
      loadingDiv.remove();
      addMessage('Network error: ' + err.message, 'bot');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
